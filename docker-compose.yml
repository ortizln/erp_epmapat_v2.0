services:
  config-server:
    build:
      context: config
      dockerfile: Dockerfile
    image: config-server:latest
    ports:
      - "8888:8888"
    environment:
      - TZ=America/Guayaquil
      - JAVA_TOOL_OPTIONS=-Duser.timezone=America/Guayaquil
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://config-server:8888/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      epmapat-nw:
        aliases:
          - config-server

  msvc-eureka:
    build:
      context: eureka
      dockerfile: Dockerfile
    image: msvc-eureka:latest
    ports:
      - "8761:8761"
    environment:
      - TZ=America/Guayaquil
      - JAVA_TOOL_OPTIONS=-Duser.timezone=America/Guayaquil
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_SERVICEURL=http://msvc-eureka
      - EUREKA_INSTANCE=msvc-eureka
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://msvc-eureka:8761/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      epmapat-nw:
        aliases:
          - msvc-eureka
