version: "3.9"
services:
  config-server:
    build:
      context: config
      dockerfile: Dockerfile
    image: config-server:latest
    container_name: config-server
    ports:
      - "8888:8888"
    restart: always
    networks:
      epmapat-nw:
        aliases:
          - config-server

  msvc-eureka:
    build:
      context: eureka
      dockerfile: Dockerfile
    image: msvc-eureka:latest
    container_name: msvc-eureka
    ports:
      - "8761:8761"
    environment:
      - EUREKA_SERVICEURL=http://msvc-eureka
      - EUREKA_INSTANCE=msvc-eureka
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://msvc-eureka:8761/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      epmapat-nw:
        aliases:
          - msvc-eureka
  msvc-gateway:
    build:
      context: gateway
      dockerfile: Dockerfile
    image: msvc-gateway:latest
    container_name: msvc-gateway
    ports:
      - "9090:9090"
    environment:
      - EUREKA_SERVICEURL=http://msvc-eureka
      - EUREKA_INSTANCE=msvc-eureka
      - DB_URL=jdbc:postgresql://192.168.0.46/ErpEpmapaT
      - DB_USER=postgres
      - DB_PASS=3pmapaT24
      - HOST=http://192.168.0.165
      - MAIL_USERNAME=facturacion@epmapatulcan.gob.ec
      - MAIL_PASSWORD=79DB6F2BFA7FFED2E17F16CABA197D2063EB
      - MAIL_HOST=smtp.elasticemail.com
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://msvc-gateway:9090/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      epmapat-nw:
        aliases:
