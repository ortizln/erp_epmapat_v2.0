spring:
  application:
    name: msvc-pagosonline
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: America/Guayaquil

  jackson:
    time-zone: America/Guayaquil
app:
  api:
    base-url: ${PAGOSONLINE_API_BASE_URL:http://192.168.0.165:9092}
  fec-factura:
    base-url: ${ERP_BACKEND_BASE_URL:http://192.168.0.165:9080/fec_factura}


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

